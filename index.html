<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Svečana Sala Nešvil - Raspored pesama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #fdf6f0;
      min-height: 100vh;
      color: #1a1a1a;

      transition: background 0.3s ease, color 0.3s ease;
    }

    body.dark {
      background: #141414;
      color: #f0f0f0;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 48px 20px 60px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.8s ease-out;
      position: relative;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: 0.08em;
      margin: 0;
      transition: color 0.3s ease;
    }

    body.dark .title { color: #f0f0f0; }
    .title span { color: #d4af37; }
    .title small { font-size: 0.55em; color: #aaa; font-family: 'Montserrat', sans-serif; font-weight: 300; letter-spacing: 0.04em; }
    body.dark .title small { color: #666; }
    .title-date { font-size: 0.55em; color: #aaa; font-family: 'Montserrat', sans-serif; font-weight: 300; letter-spacing: 0.04em; }
    body.dark .title-date { color: #666; }
    .title-subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.78rem; font-weight: 300; color: #aaa; letter-spacing: 0.06em; margin: 6px 0 0; }
    body.dark .title-subtitle { color: #555; }

    .theme-toggle-fixed {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
    }

    .theme-toggle-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .theme-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      font-weight: 400;
      color: #aaa;
      letter-spacing: 0.05em;
    }

    body.dark .theme-hint { color: #666; }

    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
    }

    .theme-toggle-inline {
      display: inline-flex;
      flex-shrink: 0;
      margin: 0;
    }

    .left-toggle-fixed {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
    }

    /* Theme toggle */
    .theme-toggle {
      display: flex;
      background: #e8ddd4;
      border-radius: 20px;
      padding: 3px;
      border: none;
      cursor: pointer;
      gap: 0;
      transition: background 0.3s ease;
    }

    body.dark .theme-toggle { background: #2a2a2a; }

    .theme-toggle .opt {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 16px;
      color: #aaa;
      transition: background 0.25s ease, color 0.25s ease;
      user-select: none;
    }

    .theme-toggle .opt.active {
      background: #fff;
      color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    body.dark .theme-toggle .opt.active {
      background: #3a3a3a;
      color: #f0f0f0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .subheader {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 28px;
      margin-top: 6px;
      animation: fadeUp 0.8s ease-out 0.1s both;
    }

    .section-label {
      font-size: 0.75rem;
      color: #999;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    body.dark .section-label { color: #666; }

    /* Timeline */
    .timeline { position: relative; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 72px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #e8d5b0 40px, #e8d5b0 calc(100% - 40px), transparent);
      transition: background 0.3s ease;
    }

    body.dark .timeline::before {
      background: linear-gradient(to bottom, transparent, #3a3020 40px, #3a3020 calc(100% - 40px), transparent);
    }

    .block {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      position: relative;
      animation: fadeUp 0.8s ease-out both;
    }

    .block:nth-child(1) { animation-delay: 0.15s; }
    .block:nth-child(2) { animation-delay: 0.25s; }
    .block:nth-child(3) { animation-delay: 0.35s; }
    .block:nth-child(4) { animation-delay: 0.45s; }
    .block:nth-child(5) { animation-delay: 0.55s; }
    .block:nth-child(6) { animation-delay: 0.65s; }
    .block:nth-child(7) { animation-delay: 0.75s; }
    .block:nth-child(8) { animation-delay: 0.85s; }

    .time-col {
      width: 72px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 2px;
      padding-right: 6px;
    }

    .time {
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      color: #888;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    body.dark .time { color: #666; }

    .duration {
      font-size: 0.68rem;
      color: #bbb;
      margin-top: 3px;
      font-weight: 300;
      transition: color 0.3s ease;
    }

    body.dark .duration { color: #555; }

    .dot {
      position: absolute;
      left: 66px;
      top: 5px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 2px solid #d4af37;
      background: #fdf6f0;
      transition: background 0.3s ease;
    }

    body.dark .dot { background: #141414; }
    .dot.gold { background: #d4af37 !important; }

    .content {
      flex: 1;
      padding-left: 28px;
    }

    .block-label {
      display: inline-block;
      align-self: flex-start;
      width: fit-content;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 6px;
      background: rgba(212, 175, 55, 0.12);
      color: #b8942a;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .block-label--wrap { width: min-content; }

    body.dark .block-label {
      background: rgba(212, 175, 55, 0.15);
      color: #c9a432;
    }

    .block-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.08rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
      transition: color 0.3s ease;
    }

    body.dark .block-title { color: #f0f0f0; }

    .block-description {
      font-size: 0.86rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      color: #999;
      margin-top: 4px;
      margin-bottom: 32px;
      transition: color 0.3s ease;
    }

    body.dark .block-description { color: #666; }

    .songs {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .songs li {
      font-size: 0.9rem;
      font-weight: 400;
      color: #555;
      padding: 6px 10px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }

    .song-author {
      display: none;
      font-size: 0.74rem;
      color: #c0625a;
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      padding: 1px 0 2px 36px;
      letter-spacing: 0.02em;
      transition: color 0.3s ease;
    }

    body.dark .song-author { color: #c07060; }
    .songs-wrap.authors-visible .song-author { display: block; }

    body.dark .songs li {
      background: #1f1f1f;
      color: #bbb;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .songs li a {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-decoration: none;
      color: inherit;
    }

    .songs li a:hover { color: #d4af37; }
    body.dark .songs li a:hover { color: #d4af37; }

    .songs li .num {
      font-size: 0.68rem;
      color: #ccc;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
      font-family: 'Courier New', monospace;
      transition: color 0.3s ease;
    }

    body.dark .songs li .num { color: #555; }

    .songs li .song-dur {
      margin-left: auto;
      font-size: 0.74rem;
      color: #ccc;
      font-family: 'Courier New', monospace;
      flex-shrink: 0;
      letter-spacing: 0.03em;
      transition: color 0.3s ease;
    }

    body.dark .songs li .song-dur { color: #444; }

    .songs li .song-gender {
      font-size: 0.88rem;
      flex-shrink: 0;
      opacity: 0.65;
    }

    .songs li .play-icon {
      color: #ff0000;
      font-size: 0.6rem;
      flex-shrink: 0;
      opacity: 0.75;
      transition: opacity 0.2s ease;
    }

    .songs li a:hover .play-icon { opacity: 1; }

    .no-songs {
      font-size: 0.8rem;
      color: #bbb;
      font-style: italic;
      font-weight: 300;
      transition: color 0.3s ease;
    }

    body.dark .no-songs { color: #555; }

    .block-total {
      margin-top: 8px;
      font-size: 0.78rem;
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      color: #b8942a;
      letter-spacing: 0.06em;
      text-align: right;
      transition: color 0.3s ease;
    }

    body.dark .block-total { color: #c9a432; }

    .block-header {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      user-select: none;
    }

    .block-header-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .collapse-btn {
      display: flex;
      background: #e8ddd4;
      border-radius: 20px;
      padding: 3px;
      border: none;
      cursor: pointer;
      gap: 0;
      transition: background 0.3s ease;
    }

    body.dark .collapse-btn { background: #2a2a2a; }

    .collapse-btn .opt {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 3px 9px;
      border-radius: 16px;
      color: #aaa;
      transition: background 0.25s ease, color 0.25s ease;
      user-select: none;
    }

    .collapse-btn .opt.active {
      background: #fff;
      color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    body.dark .collapse-btn .opt.active {
      background: #3a3a3a;
      color: #f0f0f0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .songs-wrap {
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.3s ease;
      max-height: 6000px;
      opacity: 1;
    }

    .songs-wrap.collapsed {
      max-height: 0;
      opacity: 0;
    }

    /* ceremony */
    .block.ceremony .dot { background: #d4af37; }
    .block.ceremony .block-label { background: rgba(212, 175, 55, 0.2); color: #9a7a1a; }
    .block.ceremony .block-title { color: #9a7a1a; }
    body.dark .block.ceremony .block-label { color: #c9a432; }
    body.dark .block.ceremony .block-title { color: #c9a432; }



    .block.end-milestone .dot { background: #c0392b; width: 14px; height: 14px; margin-left: -4px; }
    .block.end-milestone .block-label { background: rgba(192,57,43,0.12); color: #c0392b; }
    body.dark .block.end-milestone .block-label { background: rgba(192,57,43,0.15); color: #e74c3c; }
    .block.end-milestone .time { color: #c0392b; font-weight: 700; }

    .block.skip-block .dot { background: #bbb; }
    .songs li.skip-group-label { font-size: 0.72em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; padding: 0.7em 0 0.2em; pointer-events: none; text-align: center; }
    .songs li.skip-group-label:first-child { padding-top: 0.2em; }
    .block.skip-block .block-label { background: rgba(150,150,150,0.12); color: #999; }
    body.dark .block.skip-block .block-label { background: rgba(150,150,150,0.15); color: #666; }
    .block.skip-block .time { color: #bbb; }
    .block.skip-block .duration { color: #bbb; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .header { margin-bottom: 28px; }
      .title { font-size: 1.4rem; }
      .container { padding-left: 12px; padding-right: 12px; }
      .time-col { width: 56px; }
      .timeline::before { left: 56px; }
      .dot { left: 50px; }
      .content { padding-left: 22px; }
    }
  </style>
</head>
<body>
  <button class="theme-toggle left-toggle-fixed" onclick="toggleAllAuthors(this)">
    <span class="opt">Prikaži izvođače</span>
    <span class="opt active">Sakrij</span>
  </button>
  <div class="container" style="position:relative;">

    <header class="header">
      <div class="header-row">
        <h1 class="title">Raspored <span>pesama</span></h1>
        <button class="theme-toggle theme-toggle-inline" onclick="toggleTheme()"><span class="opt active" id="opt-light">Svetla</span><span class="opt" id="opt-dark">Tamna</span></button>
      </div>
      <p class="title-subtitle">Svečana sala Nešvil — zakazana za 31.05.2026.</p>
    </header>


    <div class="timeline">

      <div class="block">
        <div class="time-col">
          <div class="time">15:00</div>
          <div class="duration">80 min</div>
        </div>
        <div class="dot"></div>
        <div class="content">
          <span class="block-label">Doček gostiju</span>
          <div class="block-description">Slikanje sa mladencima</div>
        </div>
      </div>

      <div id="timeline"></div>

    </div>
  </div>

  <script>
    function toggleTheme() {
      const dark = document.body.classList.toggle('dark');
      document.getElementById('opt-light').classList.toggle('active', !dark);
      document.getElementById('opt-dark').classList.toggle('active', dark);
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('opt-light').classList.remove('active');
      document.getElementById('opt-dark').classList.add('active');
    }

    // --- CSV parser (handles quoted fields) ---
    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const headers = parseLine(lines[0]);
      return lines.slice(1).map(line => {
        const cols = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (cols[i] || '').trim());
        return obj;
      }).filter(row => Object.values(row).some(v => v));
    }

    function parseLine(line) {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur);
      return cols;
    }

    function parseDuration(dur) {
      if (!dur) return 0;
      const parts = dur.split(':');
      return parseInt(parts[0] || 0) * 60 + parseInt(parts[1] || 0);
    }

    function formatTotal(secs) {
      const m = Math.floor(secs / 60);
      const s = secs % 60;
      return s > 0 ? `${m} min ${s} sec` : `${m} min`;
    }

    function addMinutes(hhmm, mins) {
      const [h, m] = hhmm.split(':').map(Number);
      const total = h * 60 + m + mins;
      return `${String(Math.floor(total / 60)).padStart(2,'0')}:${String(total % 60).padStart(2,'0')}`;
    }

    function genderEmoji(g) {
      return { m: '👨🏻', f: '👩‍🦰', inst: '🎹', duo: '👫🏻', mp3: '💻' }[g] || '';
    }

    function buildTimeline(blocks, songs) {
      const byBlock = {};
      songs.forEach(s => {
        if (!s.block || s.flag === 'backlog') return;
        if (!byBlock[s.block]) byBlock[s.block] = [];
        byBlock[s.block].push(s);
      });

      const timeline = document.getElementById('timeline');
      const sorted = blocks.slice().sort((a, b) => +a.order_id - +b.order_id);

      let cursor = '16:20'; // start after slikanje

      timeline.innerHTML = sorted.map((b, idx) => {
        const list = byBlock[b.block] || [];
        const startTime = cursor;

        const totalSecs = b.fixed_minutes
          ? +b.fixed_minutes * 60
          : list.reduce((sum, s) => sum + parseDuration(s.duration), 0);

        const totalMins = Math.ceil(totalSecs / 60);
        cursor = addMinutes(cursor, totalMins);

        const totalHTML = totalSecs > 0
          ? `<div class="block-total">Ukupno: ${formatTotal(totalSecs)}</div>`
          : '';

        const innerHTML = list.length
          ? '<ul class="songs">' + list.map((s, i) =>
              `<li><a href="https://www.youtube.com/watch?v=${s.id}" target="_blank" rel="noopener"><span class="num">${s.flag === 'optional' ? '(' + (i + 1) + ')' : i + 1}</span><span class="play-icon">▶</span>${s.title}${s.duration ? `<span class="song-dur">${s.duration}</span>` : ''}${genderEmoji(s.gender) ? `<span class="song-gender">${genderEmoji(s.gender)}</span>` : ''}</a>${s.author_main ? `<div class="song-author">${s.author_main}</div>` : ''}</li>`
            ).join('') + '</ul>' + totalHTML
          : `<p class="no-songs">${b.fixed_minutes ? formatTotal(+b.fixed_minutes * 60) : 'Pesme — placeholder'}</p>`;

        const collapseBtn = '';

        const delay = (idx * 0.1).toFixed(1);

        return `
          <div class="block" style="animation-delay:${delay}s">
            <div class="time-col">
              <div class="time">${startTime}</div>
              <div class="duration">${totalMins ? totalMins + ' min' : '—'}</div>
            </div>
            <div class="dot${b.block === 'vencanje' ? ' gold' : ''}"></div>
            <div class="content">
              <div class="block-header">
                <div class="block-header-top">
                  <span class="block-label${b.block === 'ulaz_mladenaca' ? ' block-label--wrap' : ''}">${b.label}</span>
                  ${collapseBtn}
                </div>
                ${b.description ? `<div class="block-description">${b.description}</div>` : ''}
              </div>
              <div class="songs-wrap">${innerHTML}</div>
            </div>
          </div>`;
      }).join('');


      // End milestone
      timeline.innerHTML += `
        <div class="block end-milestone" style="animation-delay:${(sorted.length * 0.1).toFixed(1)}s">
          <div class="time-col">
            <div class="time">23:00</div>
            <div class="duration"></div>
          </div>
          <div class="dot"></div>
          <div class="content">
            <div class="block-header">
              <div class="block-header-top">
                <span class="block-label">Kraj proslave</span>
              </div>
              <div class="block-description">Do tada je zakupljena sala — zvanični kraj proslave i svirke</div>
            </div>
          </div>
        </div>`;

      // Skip songs section
      const skipSongs = songs.filter(s => s.flag === 'backlog');
      if (skipSongs.length) {
        const blockLabelMap = {};
        blocks.forEach(b => { blockLabelMap[b.block] = b.label; });
        const skipByBlock = {};
        skipSongs.forEach(s => {
          if (!skipByBlock[s.block]) skipByBlock[s.block] = [];
          skipByBlock[s.block].push(s);
        });
        const blockOrder = blocks.map(b => b.block);
        const skipList = Object.entries(skipByBlock)
          .sort((a, b) => {
            const ai = blockOrder.indexOf(a[0]);
            const bi = blockOrder.indexOf(b[0]);
            return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
          })
          .map(([block, bSongs]) => {
            const label = blockLabelMap[block] || block;
            const items = bSongs.map((s, i) =>
              `<li><a href="https://www.youtube.com/watch?v=${s.id}" target="_blank" rel="noopener"><span class="num">${i + 1}</span><span class="play-icon">▶</span>${s.title}${s.duration ? `<span class="song-dur">${s.duration}</span>` : ''}</a>${s.author_main ? `<div class="song-author">${s.author_main}</div>` : ''}</li>`
            ).join('');
            return `<li class="skip-group-label">${label}</li>${items}`;
          }).join('');
        const skipListHtml = '<ul class="songs">' + skipList + '</ul>';
        timeline.innerHTML += `
          <div class="block skip-block" style="animation-delay:${(sorted.length * 0.1).toFixed(1)}s">
            <div class="time-col">
              <div class="time">—</div>
              <div class="duration">—</div>
            </div>
            <div class="dot"></div>
            <div class="content">
              <div class="block-header">
                <div class="block-header-top">
                  <span class="block-label">Rezervne pesme</span>
                  <button class="collapse-btn" onclick="toggleBlock(this)"><span class="opt">Prikaži</span><span class="opt active">Sakrij</span></button>
                </div>
                <div class="block-description">Ranije planirane pesme, sakrivene zbog prioriteta</div>
              </div>
              <div class="songs-wrap collapsed">${skipListHtml}</div>
            </div>
          </div>`;
      }
    }

    function toggleAllAuthors(btn) {
      const anchor = document.elementFromPoint(window.innerWidth / 2, window.innerHeight / 2);
      const anchorTop = anchor ? anchor.getBoundingClientRect().top : 0;

      const wraps = document.querySelectorAll('.songs-wrap');
      const anyVisible = [...wraps].some(w => w.classList.contains('authors-visible'));
      wraps.forEach(w => w.classList.toggle('authors-visible', !anyVisible));

      const opts = btn.querySelectorAll('.opt');
      opts[0].classList.toggle('active', anyVisible);
      opts[1].classList.toggle('active', !anyVisible);

      if (anchor) window.scrollBy(0, anchor.getBoundingClientRect().top - anchorTop);
    }

    function toggleBlock(btn) {
      const wrap = btn.closest('.content').querySelector('.songs-wrap');
      const collapsed = wrap.classList.toggle('collapsed');
      const opts = btn.querySelectorAll('.opt');
      opts[0].classList.toggle('active', !collapsed);
      opts[1].classList.toggle('active', collapsed);
    }

    const v = Date.now();
    Promise.all([
      fetch(`blocks.csv?v=${v}`).then(r => r.text()),
      fetch(`playlist.csv?v=${v}`).then(r => r.text())
    ]).then(([blocksText, playlistText]) => {
      buildTimeline(parseCSV(blocksText), parseCSV(playlistText));
    }).catch(err => {
      document.getElementById('timeline').innerHTML =
        '<p style="color:#c00;font-family:sans-serif;padding:20px">Greška pri učitavanju CSV-a. Otvori stranicu preko servera (ne file://).<br><small>' + err + '</small></p>';
    });
  </script>
</body>
</html>
